app = 'reabiclinic-api-empty-dream-4922'
primary_region = 'gig'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[env]
  DB_HOST = 'reabiclinicbanco.flycast'
  DB_PORT = 5432
  DB_USERNAME = 'postgres'
  DB_NAME = 'postgres'
  DB_ADMIN_EMAIL = 'admin@root.com'
  DATABASE_URL = 'postgres://user:password@hostname:port/dbname'
  SWAGGER_LOCAL = '/'
  WHATSAPP_API_PHONE_NUMBER_ID = '479681805227427'
  REDIRECT_URI = 'http://localhost:3000/oauth2callback'
  URL_AMBIENTE = 'http://localhost:3000'
  REDIS_HOST = 'fly-reabiredis.upstash.io'
  REDIS_FAMILY = 6
  REDIS_USERNAME = 'default'
